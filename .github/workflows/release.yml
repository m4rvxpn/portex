name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64

          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64

          - runner: macos-13
            goos: darwin
            goarch: amd64

          - runner: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install libpcap (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y libpcap-dev

      - name: Install libpcap (macOS)
        if: matrix.goos == 'darwin'
        run: brew install libpcap

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          VERSION=${{ github.ref_name }}
          BIN=portex-${{ matrix.goos }}-${{ matrix.goarch }}
          go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "${BIN}" \
            ./cmd/portex

      - name: Archive
        run: |
          BIN=portex-${{ matrix.goos }}-${{ matrix.goarch }}
          tar czf "${BIN}.tar.gz" "${BIN}"
          sha256sum "${BIN}.tar.gz" > "${BIN}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portex-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            portex-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            portex-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
