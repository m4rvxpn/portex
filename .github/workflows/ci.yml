name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install libpcap
        run: sudo apt-get install -y libpcap-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./internal/... -short -count=1 -v

      - name: Build
        run: go build -o /dev/null ./cmd/portex
